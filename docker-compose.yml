services:
  postgres:
    image: postgres:15-alpine
    container_name: blog-postgres
    environment:
      - POSTGRES_USER=blog
      - POSTGRES_PASSWORD=${PG_PASSWORD:-secureprodpassword123}
      - POSTGRES_DB=blog
    volumes:
      - blog-postgres-data:/var/lib/postgresql/data
    networks:
      - blog-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VERSION=${VERSION:-dev}
        - GIT_COMMIT=${GIT_COMMIT:-unknown}
        - BUILD_TIME=${BUILD_TIME:-unknown}
        - GO_VERSION=${GO_VERSION:-unknown}
    container_name: blog-app
    ports:
      - "127.0.0.1:22222:22222"
    volumes:
      # Mount uploads directory to persist user-uploaded files across rebuilds
      - blog-uploads:/static/uploads
    environment:
      - PG_USER=blog
      - PG_PASSWORD=${PG_PASSWORD:-changeme}
      - PG_DB=blog
      - PG_HOST=postgres
      - PG_PORT=5432
      - APP_DISABLE_SIGNUP=true
      - API_TOKEN=${API_TOKEN:-changeme}
      - SESSION_SECRET=${SESSION_SECRET:-changeme}
      - APP_ENV=${APP_ENV:-development}
      - DEPLOY_BRANCH=${DEPLOY_BRANCH:-unknown}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - blog-network
    restart: unless-stopped

volumes:
  blog-postgres-data:
    external: true
  blog-uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${BLOG_UPLOADS_PATH:-/home/ubuntu/projects/blog/static/uploads}

networks:
  blog-network:
    driver: bridge
