services:
  # Standalone OpenTelemetry Collector — receives OTLP traces from the app and
  # exports directly to Datadog APM.
  #
  # The dd-agent's built-in OTLP ingest pipeline fails on cgroupv2 hosts with
  # "failed to register process metrics: process does not exist". This standalone
  # collector has no such requirement and works on all Linux kernel versions.
  #
  # To switch APM providers: replace the datadog exporter in otel-config.yaml
  # with a different OTLP-compatible backend — no application code changes needed.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: blog-otel-collector
    command: ["--config", "/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE:-datadoghq.com}
    networks:
      - blog-network
    restart: unless-stopped

  dd-agent:
    image: gcr.io/datadoghq/agent:7
    container_name: blog-dd-agent
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      # APM port for native Datadog traces (not OTLP — that goes via otel-collector)
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      # Log collection from containers
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=false
      # Process and container monitoring
      - DD_PROCESS_AGENT_ENABLED=true
      - DD_CONTAINER_EXCLUDE=name:dd-agent
      # DogStatsD for custom metrics
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_LOG_LEVEL=warn
      # Unified tags applied to all data sent by this agent
      - DD_ENV=${APP_ENV:-development}
      - DD_SERVICE=blog
      - DD_VERSION=${VERSION:-dev}
      # Made available for postgres autodiscovery check (%%env_PG_PASSWORD%%)
      - PG_PASSWORD=${PG_PASSWORD:-secureprodpassword123}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      - /etc/passwd:/etc/passwd:ro
    privileged: true
    networks:
      - blog-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: blog-postgres
    environment:
      - POSTGRES_USER=blog
      - POSTGRES_PASSWORD=${PG_PASSWORD:-secureprodpassword123}
      - POSTGRES_DB=blog
    volumes:
      - blog-postgres-data:/var/lib/postgresql/data
    networks:
      - blog-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      # Unified Service Tagging — links metrics, logs, and traces in Datadog
      com.datadoghq.tags.service: "blog-postgres"
      com.datadoghq.tags.env: "${APP_ENV:-development}"
      # Ship postgres logs to Datadog Logs
      com.datadoghq.ad.logs: '[{"source":"postgresql","service":"blog-postgres"}]'
      # PostgreSQL integration — autodiscovered by the DD agent
      # Exposes query metrics, connection pool stats, replication lag, etc.
      com.datadoghq.ad.check_names: '["postgres"]'
      com.datadoghq.ad.init_configs: '[{}]'
      com.datadoghq.ad.instances: '[{"host":"%%host%%","port":5432,"username":"blog","password":"%%env_PG_PASSWORD%%","dbname":"blog","tags":["env:${APP_ENV:-development}"]}]'

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VERSION=${VERSION:-dev}
        - GIT_COMMIT=${GIT_COMMIT:-unknown}
        - BUILD_TIME=${BUILD_TIME:-unknown}
        - GO_VERSION=${GO_VERSION:-unknown}
    container_name: blog-app
    ports:
      - "127.0.0.1:22222:22222"
    volumes:
      # Mount uploads directory to persist user-uploaded files across rebuilds
      - blog-uploads:/static/uploads
      # Persist go-draw canvas data across rebuilds
      - blog-draw-data:/data/draw-data
    environment:
      - PG_USER=blog
      - PG_PASSWORD=${PG_PASSWORD:-secureprodpassword123}
      - PG_DB=blog
      - PG_HOST=postgres
      - PG_PORT=5432
      - APP_DISABLE_SIGNUP=true
      - API_TOKEN=${API_TOKEN:-productionSecretToken456}
      - SESSION_SECRET=${SESSION_SECRET:-productionSessionSecret789}
      - APP_ENV=${APP_ENV:-development}
      - DEPLOY_BRANCH=${DEPLOY_BRANCH:-unknown}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      # GitHub OAuth
      - GH_CLIENT_ID=${GH_CLIENT_ID:-}
      - GH_CLIENT_SECRET=${GH_CLIENT_SECRET:-}
      - OAUTH_STATE_SECRET=${OAUTH_STATE_SECRET:-}
      - APP_URL=${APP_URL:-http://localhost:22222}
      # APM — set APM_ENABLED=true to activate tracing.
      # Change OTEL_EXPORTER_OTLP_ENDPOINT to switch providers (no code changes).
      - APM_ENABLED=${APM_ENABLED:-false}
      - OTEL_SERVICE_NAME=blog
      - OTEL_SERVICE_VERSION=${VERSION:-dev}
      - OTEL_ENVIRONMENT=${APP_ENV:-development}
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - blog-network
    restart: unless-stopped
    labels:
      # Unified Service Tagging — links APM traces, logs, and infra metrics
      com.datadoghq.tags.service: "blog"
      com.datadoghq.tags.env: "${APP_ENV:-development}"
      com.datadoghq.tags.version: "${VERSION:-dev}"
      # Ship Go app logs to Datadog Logs (structured JSON from zerolog)
      com.datadoghq.ad.logs: '[{"source":"go","service":"blog"}]'

volumes:
  blog-postgres-data:
    external: true
  blog-draw-data:
  blog-uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${BLOG_UPLOADS_PATH:-/home/ubuntu/projects/blog/static/uploads}

networks:
  blog-network:
    driver: bridge
