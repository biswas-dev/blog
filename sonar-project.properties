sonar.projectKey=blog
sonar.projectName=Anshuman Biswas Blog
sonar.projectVersion=1.0

# Source and test configuration
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.go.coverage.reportPaths=coverage.out
sonar.exclusions=**/node_modules/**,**/vendor/**,**/tmp/**,**/migrations/**,**/static/**,**/templates/**,**/pids/**,**/logs/**,**/*.gohtml,**/*_test.go,**/testdata/**,coverage.html,coverage.out

# Coverage quality gate (35% overall with 75-90% on critical packages)
sonar.coverage.minimum=35.0

# New code coverage threshold (75% for refactored code)
sonar.newCode.coverage.threshold=75.0

# Quality gate settings
sonar.qualitygate.wait=true

# Scanner configuration
sonar.scanner.socketTimeout=120
sonar.scanner.connectTimeout=30

# Go-specific settings
sonar.go.tests.reportPaths=test-report.json
sonar.go.govet.reportPaths=govet-report.out
