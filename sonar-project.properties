sonar.projectKey=blog
sonar.projectName=Anshuman Biswas Blog
sonar.projectVersion=1.0

# Source and test configuration
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.go.coverage.reportPaths=coverage.out
sonar.exclusions=**/node_modules/**,**/vendor/**,**/tmp/**,**/migrations/**,**/static/**,**/templates/**,**/pids/**,**/logs/**,**/*.gohtml,**/*_test.go,**/testdata/**,coverage.html,coverage.out,**/playwright-report/**,**/tests/playwright-report/**

# Coverage quality gate (progressive improvement target)
sonar.coverage.minimum=35.0

# New code coverage threshold (progressive - currently at 37.5%)
sonar.newCode.coverage.threshold=35.0

# Quality gate settings (non-blocking - TODO: fix quality gate issues and re-enable)
sonar.qualitygate.wait=false

# Scanner configuration
sonar.scanner.socketTimeout=120
sonar.scanner.connectTimeout=30

# Go-specific settings
sonar.go.tests.reportPaths=test-report.json
sonar.go.govet.reportPaths=govet-report.out
