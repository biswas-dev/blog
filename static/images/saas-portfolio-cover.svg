<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" fill="none">
  <defs>
    <linearGradient id="tealGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E8C7D" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1DB89E" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Subtle grid -->
  <g opacity="0.07" stroke="#B0BEC5" stroke-width="0.5">
    <line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="800" y1="0" x2="800" y2="800"/>
    <line x1="1000" y1="0" x2="1000" y2="800"/>
    <line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="600" x2="1280" y2="600"/>
  </g>

  <!-- Node dots -->
  <g fill="#0E8C7D" opacity="0.3">
    <circle cx="200" cy="200" r="3"/>
    <circle cx="400" cy="200" r="4"/>
    <circle cx="600" cy="200" r="3"/>
    <circle cx="800" cy="400" r="5"/>
    <circle cx="1000" cy="200" r="3"/>
    <circle cx="200" cy="400" r="3"/>
    <circle cx="600" cy="400" r="4"/>
    <circle cx="1000" cy="400" r="3"/>
    <circle cx="400" cy="600" r="3"/>
    <circle cx="800" cy="600" r="4"/>
    <circle cx="1000" cy="600" r="3"/>
  </g>

  <!-- Connection lines -->
  <g stroke="url(#tealGlow)" stroke-width="1.5" opacity="0.4">
    <line x1="400" y1="200" x2="600" y2="200"/>
    <line x1="600" y1="200" x2="800" y2="400"/>
    <line x1="800" y1="400" x2="1000" y2="400"/>
    <line x1="800" y1="400" x2="600" y2="400"/>
    <line x1="600" y1="400" x2="400" y2="600"/>
    <line x1="800" y1="400" x2="800" y2="600"/>
    <line x1="200" y1="200" x2="400" y2="200"/>
    <line x1="200" y1="400" x2="200" y2="200"/>
    <line x1="1000" y1="200" x2="1000" y2="400"/>
  </g>

  <!-- TaskAI hexagons - top right -->
  <g transform="translate(900, 120)" opacity="0.15">
    <polygon points="40,0 80,23 80,69 40,92 0,69 0,23" fill="#0E8C7D"/>
    <polygon points="100,30 140,53 140,99 100,122 60,99 60,53" fill="#1DB89E"/>
    <polygon points="40,90 80,113 80,159 40,182 0,159 0,113" fill="#0E8C7D"/>
  </g>

  <!-- FlagTGL flag - right side -->
  <g transform="translate(1050, 350)" opacity="0.12">
    <rect x="0" y="0" width="4" height="120" rx="2" fill="#5B9BD5"/>
    <path d="M 4 0 L 80 15 L 80 55 L 4 40 Z" fill="#4472C4"/>
    <path d="M 4 45 L 60 58 L 60 90 L 4 77 Z" fill="#5B9BD5"/>
  </g>

  <!-- Pingrly heartbeat - bottom right -->
  <g transform="translate(750, 620)" opacity="0.2">
    <polyline points="0,40 30,40 40,10 55,70 70,30 85,50 100,40 130,40 140,15 155,65 170,35 185,45 220,40 280,40"
      stroke="#F5A623" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- AI Agent Lens shield - bottom left -->
  <g transform="translate(100, 550)" opacity="0.12">
    <path d="M 50 0 L 100 25 L 100 70 C 100 100 75 120 50 130 C 25 120 0 100 0 70 L 0 25 Z" fill="#E53935"/>
    <path d="M 50 30 L 70 45 L 45 80 L 30 65 Z" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.6"/>
  </g>

  <!-- Floating data packets -->
  <g opacity="0.2">
    <rect x="300" y="280" width="30" height="8" rx="4" fill="#0E8C7D"/>
    <rect x="500" y="330" width="24" height="8" rx="4" fill="#5B9BD5"/>
    <rect x="700" y="250" width="20" height="8" rx="4" fill="#F5A623"/>
    <rect x="900" y="500" width="28" height="8" rx="4" fill="#E53935"/>
    <rect x="150" y="350" width="22" height="8" rx="4" fill="#1DB89E"/>
    <rect x="1100" y="280" width="26" height="8" rx="4" fill="#0E8C7D"/>
  </g>

  <!-- Scalability arcs - top left -->
  <g transform="translate(80, 80)" opacity="0.08" stroke="#0E8C7D" fill="none" stroke-width="1.5">
    <circle cx="0" cy="0" r="40"/>
    <circle cx="0" cy="0" r="70"/>
    <circle cx="0" cy="0" r="100"/>
  </g>

  <!-- Container blocks - bottom center -->
  <g transform="translate(500, 680)" opacity="0.1">
    <rect x="0" y="0" width="35" height="25" rx="3" stroke="#0E8C7D" stroke-width="1.5" fill="none"/>
    <rect x="42" y="0" width="35" height="25" rx="3" stroke="#5B9BD5" stroke-width="1.5" fill="none"/>
    <rect x="84" y="0" width="35" height="25" rx="3" stroke="#F5A623" stroke-width="1.5" fill="none"/>
    <rect x="126" y="0" width="35" height="25" rx="3" stroke="#E53935" stroke-width="1.5" fill="none"/>
    <line x1="-10" y1="30" x2="170" y2="30" stroke="#546E7A" stroke-width="1"/>
  </g>

  <!-- Code symbols scattered -->
  <g font-family="monospace" font-size="20" opacity="0.06" fill="#B0BEC5">
    <text x="250" y="150">{}</text>
    <text x="700" y="130">&lt;/&gt;</text>
    <text x="1100" y="180">fn()</text>
    <text x="350" y="500">[]</text>
    <text x="950" y="650">=&gt;</text>
  </g>
</svg>
