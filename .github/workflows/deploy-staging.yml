name: Deploy to Staging

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # Fail if vulnerabilities found
          ignore-unfixed: true

  deploy-staging:
    needs: security-scan  # Only deploy if security scan passes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for git describe

      - name: Set version information
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "v0.0.0-${GITHUB_SHA::8}")
          GIT_COMMIT=${GITHUB_SHA}
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          GO_VERSION=$(grep '^go ' go.mod | awk '{print $2}')

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT=$GIT_COMMIT" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "GO_VERSION=go$GO_VERSION" >> $GITHUB_OUTPUT

          echo "🏷️  Version: $VERSION"
          echo "📝 Commit: $GIT_COMMIT"
          echo "🕐 Build Time: $BUILD_TIME"
          echo "🔧 Go Version: go$GO_VERSION"

      - name: Deploy to Staging server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          PG_PASSWORD: ${{ secrets.BLOG_PG_PASSWORD }}
          SESSION_SECRET: ${{ secrets.BLOG_SESSION_SECRET }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          GIT_COMMIT: ${{ steps.version.outputs.GIT_COMMIT }}
          BUILD_TIME: ${{ steps.version.outputs.BUILD_TIME }}
          GO_VERSION: ${{ steps.version.outputs.GO_VERSION }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan 129.213.82.37 >> ~/.ssh/known_hosts

          echo "🚀 Deploying Blog to Staging server..."
          echo "Commit: $COMMIT_SHA"

          # Deploy to Staging server using docker-compose
          ssh -i ~/.ssh/deploy_key ubuntu@129.213.82.37 "bash -s" << EOF
            set -e

            # Create deployment directory
            mkdir -p ~/blog-staging
            cd ~/blog-staging

            # Clone or pull latest code
            if [ -d ".git" ]; then
              echo "📦 Pulling latest code..."
              git fetch origin
              git reset --hard $COMMIT_SHA
            else
              echo "📦 Cloning repository..."
              git clone https://github.com/anchoo2kewl/blog.git .
              git checkout $COMMIT_SHA
            fi

            # Ensure Docker volume exists
            docker volume inspect blog-postgres-data >/dev/null 2>&1 || docker volume create blog-postgres-data

            # Setup nginx configuration
            echo "⚙️  Configuring nginx..."
            chmod +x scripts/setup-nginx-staging.sh
            ./scripts/setup-nginx-staging.sh

            # Setup Cloudflare Origin Certificate (if API token is available)
            if [ ! -z "$CF_API_TOKEN" ]; then
              echo "🔐 Setting up Cloudflare Origin Certificate..."
              chmod +x scripts/setup-cloudflare-ssl.sh
              sudo CF_API_TOKEN='$CF_API_TOKEN' ./scripts/setup-cloudflare-ssl.sh staging.anshumanbiswas.com || echo "⚠️  SSL setup skipped, using existing certificate"
            fi

            # Create uploads directory if it doesn't exist
            mkdir -p static/uploads

            # Update environment variables in docker-compose.yml
            export PG_PASSWORD='$PG_PASSWORD'
            export SESSION_SECRET='$SESSION_SECRET'
            export BLOG_UPLOADS_PATH="/home/ubuntu/blog-staging/static/uploads"

            # Set version information for build
            export VERSION='$VERSION'
            export GIT_COMMIT='$GIT_COMMIT'
            export BUILD_TIME='$BUILD_TIME'
            export GO_VERSION='$GO_VERSION'

            # Set deployment context
            export APP_ENV='staging'
            export DEPLOY_BRANCH='$BRANCH'

            echo "🛑 Stopping existing containers..."
            docker compose down || true

            echo "🧹 Cleaning up any stale containers..."
            docker rm -f blog-postgres blog-app 2>/dev/null || true

            echo "🔨 Building and starting containers with docker-compose..."
            docker compose up -d --build

            echo "🔄 Reloading nginx to apply SSL certificate..."
            sudo systemctl reload nginx || echo "⚠️  Nginx reload skipped"

            echo "⏳ Waiting for postgres to be healthy..."
            sleep 10

            echo "🔐 Ensuring postgres password is synchronized..."
            docker exec blog-postgres psql -U blog -d blog -c "ALTER USER blog WITH PASSWORD '\$PG_PASSWORD';" || echo "Database not yet initialized, password will be set on first init"

            echo "🧹 Cleaning up old images..."
            docker image prune -f --filter "until=24h"

            echo "✅ Deployment complete!"
            docker compose ps
          EOF

      - name: Verify deployment
        run: |
          echo "⏳ Waiting for application to start..."
          sleep 10

          echo "🔍 Testing Staging endpoint via nginx..."
          curl -f -H "Host: staging.anshumanbiswas.com" http://129.213.82.37 || {
            echo "❌ Health check failed"
            exit 1
          }

          echo "✅ Health check passed"

      - name: Deployment summary
        run: |
          echo "## 🚀 Staging Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** 129.213.82.37" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Domain:** staging.anshumanbiswas.com" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Access:**" >> $GITHUB_STEP_SUMMARY
          echo "- Public: https://staging.anshumanbiswas.com (via Cloudflare)" >> $GITHUB_STEP_SUMMARY
