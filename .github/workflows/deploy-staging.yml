name: Deploy to Staging

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # Fail if vulnerabilities found
          ignore-unfixed: true

  deploy-staging:
    needs: security-scan  # Only deploy if security scan passes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          PG_PASSWORD: ${{ secrets.BLOG_PG_PASSWORD }}
          SESSION_SECRET: ${{ secrets.BLOG_SESSION_SECRET }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan 129.213.82.37 >> ~/.ssh/known_hosts

          echo "🚀 Deploying Blog to Staging server..."
          echo "Commit: $COMMIT_SHA"

          # Deploy to Staging server
          ssh -i ~/.ssh/deploy_key ubuntu@129.213.82.37 "bash -s" << EOF
            set -e

            # Create deployment directory
            mkdir -p ~/blog-staging
            cd ~/blog-staging

            # Clone or pull latest code
            if [ -d ".git" ]; then
              echo "📦 Pulling latest code..."
              git fetch origin
              git reset --hard $COMMIT_SHA
            else
              echo "📦 Cloning repository..."
              git clone https://github.com/anchoo2kewl/blog.git .
              git checkout $COMMIT_SHA
            fi

            echo "🔨 Building Docker image..."
            docker build -t blog-staging:$COMMIT_SHA -t blog-staging:latest .

            echo "🛑 Stopping existing container..."
            docker stop blog-staging || true
            docker rm blog-staging || true

            echo "🚀 Starting new container..."
            docker run -d --name blog-staging \\
              -p 22222:22222 \\
              --restart unless-stopped \\
              --link blog-postgres:postgres \\
              -e PG_HOST=blog-postgres \\
              -e PG_PORT=5432 \\
              -e PG_USER=blog \\
              -e PG_PASSWORD='$PG_PASSWORD' \\
              -e PG_DB=blog \\
              -e SESSION_SECRET='$SESSION_SECRET' \\
              -e API_TOKEN='$SESSION_SECRET' \\
              -e APP_PORT=22222 \\
              -v ~/blog-staging/uploads:/uploads \\
              blog-staging:latest

            echo "🧹 Cleaning up old images..."
            docker image prune -f --filter "until=24h"

            echo "✅ Deployment complete!"
            docker ps --filter "name=blog-staging" --format "table {{.Names}}\\t{{.Status}}\\t{{.Ports}}"
          EOF

      - name: Verify deployment
        run: |
          echo "⏳ Waiting for application to start..."
          sleep 10

          echo "🔍 Testing Staging endpoint..."
          curl -f http://129.213.82.37:22222 || {
            echo "❌ Health check failed"
            exit 1
          }

          echo "✅ Health check passed"

      - name: Deployment summary
        run: |
          echo "## 🚀 Staging Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** 129.213.82.37" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Domain:** staging.anshumanbiswas.com" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Access:**" >> $GITHUB_STEP_SUMMARY
          echo "- Direct: http://129.213.82.37:22222" >> $GITHUB_STEP_SUMMARY
          echo "- Public: https://staging.anshumanbiswas.com (via Cloudflare)" >> $GITHUB_STEP_SUMMARY
