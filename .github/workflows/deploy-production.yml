name: Deploy to Production

on:
  pull_request:
    types: [ closed ]
    branches: [ production ]  # PR merged to production branch triggers deployment
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production

jobs:
  security-scan:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # Fail if vulnerabilities found
          ignore-unfixed: true

  deploy-production:
    needs: security-scan  # Only deploy if security scan passes
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for git describe

      - name: Set version information
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "v0.0.0-${GITHUB_SHA::8}")
          GIT_COMMIT=${GITHUB_SHA}
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          GO_VERSION=$(grep '^go ' go.mod | awk '{print $2}')

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT=$GIT_COMMIT" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "GO_VERSION=go$GO_VERSION" >> $GITHUB_OUTPUT

          echo "🏷️  Version: $VERSION"
          echo "📝 Commit: $GIT_COMMIT"
          echo "🕐 Build Time: $BUILD_TIME"
          echo "🔧 Go Version: go$GO_VERSION"

      - name: Deploy to Production server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          PG_PASSWORD: ${{ secrets.BLOG_PG_PASSWORD }}
          SESSION_SECRET: ${{ secrets.BLOG_SESSION_SECRET }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          BLOG_API_TOKEN: ${{ secrets.BLOG_API_TOKEN }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_SITE: ${{ secrets.DD_SITE }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          OAUTH_STATE_SECRET: ${{ secrets.OAUTH_STATE_SECRET }}
          APP_URL: ${{ secrets.PRODUCTION_APP_URL }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.base_ref || github.ref_name }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          GIT_COMMIT: ${{ steps.version.outputs.GIT_COMMIT }}
          BUILD_TIME: ${{ steps.version.outputs.BUILD_TIME }}
          GO_VERSION: ${{ steps.version.outputs.GO_VERSION }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan 31.97.102.48 >> ~/.ssh/known_hosts

          echo "🚀 Deploying Blog to Production server..."
          echo "Commit: $COMMIT_SHA"

          # Deploy to Production server using docker-compose
          ssh -i ~/.ssh/deploy_key ubuntu@31.97.102.48 "bash -s" << EOF
            set -e

            # Create deployment directory
            mkdir -p ~/blog-production
            cd ~/blog-production

            # Clone or pull latest code
            if [ -d ".git" ]; then
              echo "📦 Pulling latest code..."
              git fetch origin
              git reset --hard $COMMIT_SHA
            else
              echo "📦 Cloning repository..."
              git clone https://github.com/anchoo2kewl/blog.git .
              git checkout $COMMIT_SHA
            fi

            # Login to Docker Hub to avoid rate limits
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin || echo "⚠️  Docker Hub login failed, continuing with anonymous pulls"

            # Ensure Docker volume exists
            docker volume inspect blog-postgres-data >/dev/null 2>&1 || docker volume create blog-postgres-data

            # Setup nginx configuration
            echo "⚙️  Configuring nginx..."
            chmod +x scripts/setup-nginx-production.sh
            ./scripts/setup-nginx-production.sh

            # Setup Cloudflare Origin Certificate (if API token is available)
            if [ ! -z "$CF_API_TOKEN" ]; then
              echo "🔐 Setting up Cloudflare Origin Certificate..."
              chmod +x scripts/setup-cloudflare-ssl.sh
              sudo CF_API_TOKEN='$CF_API_TOKEN' ./scripts/setup-cloudflare-ssl.sh anshumanbiswas.com || echo "⚠️  SSL setup skipped, using existing certificate"
            fi

            # Create uploads directory if it doesn't exist
            mkdir -p static/uploads

            # Update environment variables in docker-compose.yml
            export PG_PASSWORD='$PG_PASSWORD'
            export SESSION_SECRET='$SESSION_SECRET'
            export API_TOKEN='$BLOG_API_TOKEN'
            export BLOG_UPLOADS_PATH="/home/ubuntu/blog-production/static/uploads"
            export ENCRYPTION_KEY='$ENCRYPTION_KEY'

            # GitHub OAuth
            export GH_CLIENT_ID='$GH_CLIENT_ID'
            export GH_CLIENT_SECRET='$GH_CLIENT_SECRET'
            export OAUTH_STATE_SECRET='$OAUTH_STATE_SECRET'
            export APP_URL='$APP_URL'

            # Set version information for build
            export VERSION='$VERSION'
            export GIT_COMMIT='$GIT_COMMIT'
            export BUILD_TIME='$BUILD_TIME'
            export GO_VERSION='$GO_VERSION'

            # Set deployment context
            export APP_ENV='production'
            export DEPLOY_BRANCH='$BRANCH'

            # APM — Datadog agent will be started automatically via docker-compose
            export DD_API_KEY='$DD_API_KEY'
            export DD_SITE='${DD_SITE:-datadoghq.com}'
            export APM_ENABLED='true'

            echo "🛑 Stopping existing containers..."
            docker compose down --remove-orphans || true

            echo "🧹 Cleaning up any stale containers..."
            docker rm -f blog-postgres blog-app blog-dd-agent 2>/dev/null || true

            echo "🧹 Cleaning up Docker resources if disk space is low..."
            DISK_USAGE=\$(df / | tail -1 | awk '{print \$5}' | tr -d '%')
            echo "Current disk usage: \${DISK_USAGE}%"
            if [ "\$DISK_USAGE" -gt 80 ]; then
              echo "Disk usage above 80%, cleaning up old build cache and dangling images..."
              docker builder prune -f --filter "until=48h" || true
              docker image prune -f || true
            else
              echo "Disk usage OK, skipping aggressive cleanup"
            fi

            echo "🔨 Building image..."
            docker compose build

            echo "🧹 Final cleanup before starting containers..."
            # Stop and remove ALL containers with these names, regardless of project
            for c in blog-postgres blog-app blog-dd-agent; do
              docker stop \$c 2>/dev/null || true
              docker rm -f \$c 2>/dev/null || true
              # Also catch any with partial name matches
              docker ps -aq --filter "name=\$c" | xargs -r docker rm -f 2>/dev/null || true
            done
            # Remove any leftover networks
            docker network rm blog-production_blog-network 2>/dev/null || true
            sleep 2

            echo "🚀 Starting containers..."
            docker compose up -d

            echo "🔄 Reloading nginx to apply SSL certificate..."
            sudo systemctl reload nginx || echo "⚠️  Nginx reload skipped"

            echo "⏳ Waiting for postgres to be healthy..."
            sleep 10

            echo "🔐 Ensuring postgres password is synchronized..."
            docker exec blog-postgres psql -U blog -d blog -c "ALTER USER blog WITH PASSWORD '\$PG_PASSWORD';" || echo "Database not yet initialized, password will be set on first init"

            echo "📦 Running database migrations..."
            if [ -d "migrations" ] && ls migrations/*.up.sql 1>/dev/null 2>&1; then
              # Ensure schema_migrations table exists
              docker exec blog-postgres psql -U blog -d blog -c "
                CREATE TABLE IF NOT EXISTS schema_migrations (
                  version bigint NOT NULL PRIMARY KEY,
                  dirty boolean NOT NULL DEFAULT false
                );" 2>/dev/null

              # Bootstrap: if tables exist but no version tracked, set to 6
              CURRENT_VERSION=\$(docker exec blog-postgres psql -U blog -d blog -tAc "SELECT COALESCE(MAX(version), 0) FROM schema_migrations" 2>/dev/null || echo "0")
              CURRENT_VERSION=\$(echo "\$CURRENT_VERSION" | tr -d ' ')
              HAS_USERS=\$(docker exec blog-postgres psql -U blog -d blog -tAc "SELECT EXISTS(SELECT 1 FROM information_schema.tables WHERE table_name='users')" 2>/dev/null || echo "f")

              if [ "\$HAS_USERS" = "t" ] && [ "\$CURRENT_VERSION" -lt 6 ] 2>/dev/null; then
                echo "📋 Bootstrapping: existing DB detected at version \$CURRENT_VERSION, setting to 6"
                docker exec blog-postgres psql -U blog -d blog -c "DELETE FROM schema_migrations; INSERT INTO schema_migrations (version, dirty) VALUES (6, false);"
              fi

              # Re-read version after potential bootstrap
              CURRENT_VERSION=\$(docker exec blog-postgres psql -U blog -d blog -tAc "SELECT COALESCE(MAX(version), 0) FROM schema_migrations" 2>/dev/null || echo "0")
              CURRENT_VERSION=\$(echo "\$CURRENT_VERSION" | tr -d ' ')
              echo "Current migration version: \$CURRENT_VERSION"

              # Apply pending migrations
              APPLIED=0
              for f in \$(ls migrations/*.up.sql | sort); do
                FILE_VERSION=\$(basename "\$f" | grep -o '^[0-9]*')
                if [ "\$FILE_VERSION" -gt "\$CURRENT_VERSION" ] 2>/dev/null; then
                  echo "Applying migration \$FILE_VERSION..."
                  docker cp "\$f" blog-postgres:/tmp/migration.sql
                  if docker exec blog-postgres psql -U blog -d blog -f /tmp/migration.sql; then
                    docker exec blog-postgres psql -U blog -d blog -c "DELETE FROM schema_migrations; INSERT INTO schema_migrations (version, dirty) VALUES (\$FILE_VERSION, false);"
                    echo "✅ Migration \$FILE_VERSION applied"
                    APPLIED=\$((APPLIED + 1))
                  else
                    echo "❌ Migration \$FILE_VERSION failed"
                    docker exec blog-postgres psql -U blog -d blog -c "DELETE FROM schema_migrations; INSERT INTO schema_migrations (version, dirty) VALUES (\$FILE_VERSION, true);"
                    break
                  fi
                fi
              done
              [ "\$APPLIED" -eq 0 ] && echo "✅ All migrations up to date" || echo "✅ Applied \$APPLIED migration(s)"
            else
              echo "⚠️  No migration files found, skipping"
            fi

            # One-time cleanup of local upload files (migrated to Cloudinary)
            if [ ! -f static/uploads/.cloudinary_cleanup_done ]; then
              echo "🧹 One-time cleanup: removing local upload files (migrated to Cloudinary)..."
              rm -rf static/uploads/featured 2>/dev/null || true
              rm -rf static/uploads/post 2>/dev/null || true
              touch static/uploads/.cloudinary_cleanup_done
              echo "✅ Local upload files cleaned up"
            fi

            echo "✅ Deployment complete!"
            docker compose ps
          EOF

      - name: Verify deployment
        run: |
          echo "⏳ Waiting for application to start..."
          sleep 10

          echo "🔍 Testing Production endpoint via nginx..."
          curl -f -H "Host: anshumanbiswas.com" http://31.97.102.48 || {
            echo "❌ Health check failed"
            exit 1
          }

          echo "✅ Health check passed"

      - name: Deployment summary
        run: |
          echo "## 🚀 Production Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** 31.97.102.48" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Access:**" >> $GITHUB_STEP_SUMMARY
          echo "- Public: https://anshumanbiswas.com" >> $GITHUB_STEP_SUMMARY
