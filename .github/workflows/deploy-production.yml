name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger production webhook
        run: |
          echo "=== Deploying Blog to PRODUCTION (sonar.taskai.cc) ==="
          PAYLOAD='{"repository":{"full_name":"anchoo2kewl/blog"},"ref":"refs/heads/main"}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac '${{ secrets.PRODUCTION_WEBHOOK_SECRET }}' | awk '{print $2}')
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://webhook.biswas.me/webhook/blog-production" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -H "X-GitHub-Event: push" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "Webhook response: $RESPONSE"
          if [ "$RESPONSE" -lt 200 ] || [ "$RESPONSE" -ge 300 ]; then
            echo "WARNING: Webhook returned $RESPONSE, deployment may not have triggered"
          fi

      - name: Wait for deployment
        run: |
          echo "Waiting 60 seconds for deployment to complete..."
          sleep 60

      - name: Verify production health
        run: |
          echo "-> Checking blog health..."
          for i in $(seq 1 30); do
            if curl -sf https://sonar.taskai.cc > /dev/null 2>&1; then
              echo "OK: Blog is healthy"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "FAIL: Blog health check failed"
              exit 1
            fi
            sleep 5
          done

          echo ""
          echo "=== Production deployment completed! ==="
          echo "URL: https://sonar.taskai.cc"
