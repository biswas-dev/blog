name: Deploy to UAT

on:
  push:
    branches: [ staging ]  # Only staging branch can deploy to UAT
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'uat'
        type: choice
        options:
          - uat

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # Fail if vulnerabilities found
          ignore-unfixed: true

  deploy-uat:
    needs: security-scan  # Only deploy if security scan passes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to UAT server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.UAT_SSH_PRIVATE_KEY }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan 92.4.83.28 >> ~/.ssh/known_hosts

          echo "🚀 Deploying Blog to UAT server via Ansible..."
          echo "Commit: $COMMIT_SHA"

          # Deploy using Ansible playbook
          cd biswas-infrastructure/ansible

          # Deploy the blog application
          ssh -i ~/.ssh/id_ed25519 ubuntu@92.4.83.28 "bash -s" << EOF
            set -e

            # Create deployment directory for blog
            mkdir -p ~/blog-uat
            cd ~/blog-uat

            # Clone or pull latest code
            if [ -d ".git" ]; then
              echo "📦 Pulling latest code..."
              git fetch origin
              git reset --hard $COMMIT_SHA
            else
              echo "📦 Cloning repository..."
              git clone https://github.com/anchoo2kewl/blog.git .
              git checkout $COMMIT_SHA
            fi

            echo "🔨 Building Docker image (native ARM64)..."
            docker build -t blog-uat:$COMMIT_SHA -t blog-uat:latest .

            echo "🛑 Stopping existing container..."
            docker stop blog-uat || true
            docker rm blog-uat || true

            echo "🚀 Starting new container..."
            docker run -d --name blog-uat \\
              -p 22223:22222 \\
              --restart unless-stopped \\
              -e PG_HOST=\${PG_HOST:-localhost} \\
              -e PG_PORT=\${PG_PORT:-5432} \\
              -e PG_USER=\${PG_USER:-blog} \\
              -e PG_PASSWORD=\${PG_PASSWORD} \\
              -e PG_DB=\${PG_DB:-blog} \\
              -e SESSION_SECRET=\${SESSION_SECRET} \\
              -v ~/blog-uat/uploads:/uploads \\
              blog-uat:latest

            echo "🧹 Cleaning up old images..."
            docker image prune -f --filter "until=24h"

            echo "✅ Deployment complete!"
            docker ps --filter "name=blog-uat" --format "table {{.Names}}\\t{{.Status}}\\t{{.Ports}}"
          EOF

      - name: Verify deployment
        run: |
          echo "⏳ Waiting for application to start..."
          sleep 10

          echo "🔍 Testing UAT endpoint..."
          curl -f http://92.4.83.28:22223 || {
            echo "❌ Health check failed"
            exit 1
          }

          echo "✅ Health check passed"

      - name: Deployment summary
        run: |
          echo "## 🚀 UAT Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** 92.4.83.28" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Build:** Native ARM64 (built on server)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Access:**" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: http://92.4.83.28:22223" >> $GITHUB_STEP_SUMMARY
          echo "- Public: https://uat.anshumanbiswas.com" >> $GITHUB_STEP_SUMMARY
