name: Deploy to UAT

on:
  push:
    branches: [ uat ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'uat'
        type: choice
        options:
          - uat

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # Fail if vulnerabilities found
          ignore-unfixed: true

  deploy-uat:
    needs: security-scan  # Only deploy if security scan passes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for git describe

      - name: Set version information
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "v0.0.0-${GITHUB_SHA::8}")
          GIT_COMMIT=${GITHUB_SHA}
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          GO_VERSION=$(grep '^go ' go.mod | awk '{print $2}')

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT=$GIT_COMMIT" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "GO_VERSION=go$GO_VERSION" >> $GITHUB_OUTPUT

          echo "🏷️  Version: $VERSION"
          echo "📝 Commit: $GIT_COMMIT"
          echo "🕐 Build Time: $BUILD_TIME"
          echo "🔧 Go Version: go$GO_VERSION"

      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: anchoo2kewl/biswas-infrastructure
          path: biswas-infrastructure
          ssh-key: ${{ secrets.INFRA_SSH_PRIVATE_KEY }}

      - name: Setup SSH key for deployment
        env:
          SSH_PRIVATE_KEY: ${{ secrets.UAT_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan 92.4.83.28 >> ~/.ssh/known_hosts

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Deploy to UAT using Ansible
        env:
          PG_PASSWORD: ${{ secrets.BLOG_PG_PASSWORD }}
          SESSION_SECRET: ${{ secrets.BLOG_SESSION_SECRET }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          cd biswas-infrastructure/ansible

          echo "🚀 Deploying Blog to UAT via Ansible..."
          echo "Commit: $COMMIT_SHA"

          ansible-playbook \
            -i inventory/uat.yml \
            playbooks/deploy-blog-uat.yml \
            -e "commit_sha=$COMMIT_SHA" \
            -e "pg_password=$PG_PASSWORD" \
            -e "session_secret=$SESSION_SECRET" \
            -e "cf_api_token=$CF_API_TOKEN" \
            -e "version=${{ steps.version.outputs.VERSION }}" \
            -e "git_commit=${{ steps.version.outputs.GIT_COMMIT }}" \
            -e "build_time=${{ steps.version.outputs.BUILD_TIME }}" \
            -e "go_version=${{ steps.version.outputs.GO_VERSION }}" \
            -e "app_env=uat" \
            -e "deploy_branch=${{ github.base_ref || 'uat' }}"

      - name: Verify deployment
        run: |
          echo "⏳ Waiting for application to start..."
          sleep 10

          echo "🔍 Testing UAT endpoint via nginx..."
          curl -f -H "Host: uat.anshumanbiswas.com" http://92.4.83.28 || {
            echo "❌ Health check failed"
            exit 1
          }

          echo "✅ Health check passed"

      - name: Deployment summary
        run: |
          echo "## 🚀 UAT Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** 92.4.83.28" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed via:** Ansible" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Access:**" >> $GITHUB_STEP_SUMMARY
          echo "- Public: https://uat.anshumanbiswas.com" >> $GITHUB_STEP_SUMMARY
