# OpenTelemetry Collector configuration.
# Receives OTLP traces from the blog app and exports to Datadog APM.
#
# DD_API_KEY and DD_SITE are injected via environment variables when the
# collector starts. To switch APM providers, add a different exporter here
# and update OTEL_EXPORTER_OTLP_ENDPOINT in docker-compose.yml — no app
# code changes required.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_max_size: 100
    send_batch_size: 10
    timeout: 10s

# datadog/connector computes APM stats (p50/p75/p95/p99 latencies, error rates,
# hit rates) from trace spans and forwards them as metrics to the metrics pipeline.
# Without this, Datadog does not recognise the service as instrumented for APM.
connectors:
  datadog/connector:

exporters:
  datadog:
    api:
      key: ${env:DD_API_KEY}
      site: ${env:DD_SITE}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [datadog, datadog/connector]
    metrics:
      receivers: [otlp, datadog/connector]
      processors: [batch]
      exporters: [datadog]
